services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic transactions.raw --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic transactions.scored --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic transactions.dlq --partitions 1 --replication-factor 1
        echo "Topics created"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: fraud_db
    ports:
      - "5433:5432"
    volumes:
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d fraud_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"

  postgres-airflow:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: fraud-detection-airflow:2.8.1
    depends_on:
      postgres-airflow:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "dGVzdF9mZXJuZXRfa2V5XzMyYnl0ZXNsb25nX18="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      FRAUD_DATABASE_URL: postgresql+psycopg2://fraud:fraud@postgres:5432/fraud_db
      DBT_PROJECT_DIR: /opt/airflow/dbt_fraud
      DBT_PROFILES_DIR: /opt/airflow/dbt_fraud/profiles/airflow
      DBT_REFRESH_INTERVAL_MINUTES: ${DBT_REFRESH_INTERVAL_MINUTES:-10}
      DBT_REFRESH_ENABLED: ${DBT_REFRESH_ENABLED:-true}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./consumer:/opt/airflow/consumer
      - ./shared:/opt/airflow/shared
      - ./scripts:/opt/airflow/scripts
      - ./dbt_fraud:/opt/airflow/dbt_fraud
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --role Admin --username admin --password admin \
          --firstname Admin --lastname User --email admin@example.com || true

  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: fraud-detection-airflow:2.8.1
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "dGVzdF9mZXJuZXRfa2V5XzMyYnl0ZXNsb25nX18="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      FRAUD_DATABASE_URL: postgresql+psycopg2://fraud:fraud@postgres:5432/fraud_db
      DBT_PROJECT_DIR: /opt/airflow/dbt_fraud
      DBT_PROFILES_DIR: /opt/airflow/dbt_fraud/profiles/airflow
      DBT_REFRESH_INTERVAL_MINUTES: ${DBT_REFRESH_INTERVAL_MINUTES:-10}
      DBT_REFRESH_ENABLED: ${DBT_REFRESH_ENABLED:-true}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./consumer:/opt/airflow/consumer
      - ./shared:/opt/airflow/shared
      - ./scripts:/opt/airflow/scripts
      - ./dbt_fraud:/opt/airflow/dbt_fraud
    ports:
      - "8081:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    image: fraud-detection-airflow:2.8.1
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "dGVzdF9mZXJuZXRfa2V5XzMyYnl0ZXNsb25nX18="
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      FRAUD_DATABASE_URL: postgresql+psycopg2://fraud:fraud@postgres:5432/fraud_db
      DBT_PROJECT_DIR: /opt/airflow/dbt_fraud
      DBT_PROFILES_DIR: /opt/airflow/dbt_fraud/profiles/airflow
      DBT_REFRESH_INTERVAL_MINUTES: ${DBT_REFRESH_INTERVAL_MINUTES:-10}
      DBT_REFRESH_ENABLED: ${DBT_REFRESH_ENABLED:-true}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./consumer:/opt/airflow/consumer
      - ./shared:/opt/airflow/shared
      - ./scripts:/opt/airflow/scripts
      - ./dbt_fraud:/opt/airflow/dbt_fraud
    command: scheduler

volumes:
  airflow_db:
