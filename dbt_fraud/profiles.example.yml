# Copy to dbt_fraud/profiles.yml for local runs (host port 5433).
# Airflow uses dbt_fraud/profiles/airflow/profiles.yml (postgres:5432 inside Docker).
fraud_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: localhost
      port: 5433
      user: fraud
      password: fraud
      dbname: fraud_db
      schema: public
      threads: 4
